name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      infra-changed: ${{ steps.check.outputs.infra-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^infra/"; then
            echo "infra-changed=true" >> $GITHUB_OUTPUT
          else
            echo "infra-changed=false" >> $GITHUB_OUTPUT
          fi

  build-api:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter @bird-dex/api...

      - name: Create deploy package
        run: |
          pnpm deploy --filter @bird-dex/api --prod /tmp/api-deploy
          cd /tmp/api-deploy
          zip -r $GITHUB_WORKSPACE/api.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: api.zip

  build-web:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build --filter @bird-dex/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build-api, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep (infra changed)
        if: needs.prepare.outputs.infra-changed == 'true'
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.bicepparam
        env:
          DB_ADMIN_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GITHUB_REDIRECT_URL: ${{ secrets.GH_REDIRECT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - uses: actions/download-artifact@v4
        with:
          name: api-package

      - name: Deploy API to App Service
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RG }} \
            --name birddex-prod-api \
            --src-path api.zip \
            --type zip

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Deploy Web to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: web-dist
          skip_app_build: true
