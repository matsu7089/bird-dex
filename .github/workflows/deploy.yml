name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - uses: azure/login@v2
        with:
          creds: "${{ secrets.AZURE_CREDENTIALS }}"

      - run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push api
        run: |
          docker build -f docker/Dockerfile.api \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.tag }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.tag }}

      - name: Build & push web
        run: |
          docker build -f docker/Dockerfile.web \
            --build-arg VITE_API_URL=${{ secrets.API_URL }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/web:${{ steps.tag.outputs.tag }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/web:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: "${{ secrets.AZURE_CREDENTIALS }}"

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.bicepparam \
            --parameters apiImageTag=${{ needs.build-push.outputs.image_tag }} \
                         webImageTag=${{ needs.build-push.outputs.image_tag }}
        env:
          DB_ADMIN_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
