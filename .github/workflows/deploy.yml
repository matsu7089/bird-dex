name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      infra-changed: ${{ steps.check.outputs.infra-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^infra/"; then
            echo "infra-changed=true" >> $GITHUB_OUTPUT
          else
            echo "infra-changed=false" >> $GITHUB_OUTPUT
          fi

  deploy-infra:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.infra-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.bicepparam
        env:
          DB_ADMIN_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GITHUB_REDIRECT_URL: ${{ secrets.GH_REDIRECT_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

  build-api:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-infra]
    if: always() && needs.prepare.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          token=$(az acr login --name ${{ secrets.ACR_NAME }} --expose-token --output tsv --query accessToken)
          echo "$token" | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build --filter @bird-dex/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  deploy-app:
    runs-on: ubuntu-latest
    needs: [prepare, build-api, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          BLOB_SECRET_KEY=$(az storage account keys list \
            --account-name birddexprodst \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "[0].value" -o tsv)
          DB_URL="postgres://birdlog:${{ secrets.DB_PASSWORD }}@birddex-prod-pg.postgres.database.azure.com:5432/birdlog?sslmode=require"

          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/bicep/modules/containerApp.bicep \
            --parameters envName=prod \
            --parameters location=japaneast \
            --parameters acrLoginServer=${{ secrets.ACR_LOGIN_SERVER }} \
            --parameters acrName=${{ secrets.ACR_NAME }} \
            --parameters "apiImage=${{ secrets.ACR_LOGIN_SERVER }}/api:${{ needs.prepare.outputs.tag }}" \
            --parameters "databaseUrl=$DB_URL" \
            --parameters blobEndpoint=https://birddexprodst.blob.core.windows.net/ \
            --parameters blobAccessKey=birddexprodst \
            --parameters "blobSecretKey=$BLOB_SECRET_KEY" \
            --parameters blobBucket=birdlog-photos \
            --parameters githubClientId=${{ secrets.GH_CLIENT_ID }} \
            --parameters "githubClientSecret=${{ secrets.GH_CLIENT_SECRET }}" \
            --parameters "sessionSecret=${{ secrets.SESSION_SECRET }}" \
            --parameters githubRedirectUrl=${{ secrets.GH_REDIRECT_URL }} \
            --parameters frontendUrl=${{ secrets.FRONTEND_URL }}

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Deploy Web to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: web-dist
          skip_app_build: true
