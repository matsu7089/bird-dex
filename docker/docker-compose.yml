services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: birdlog
      POSTGRES_USER: birdlog
      POSTGRES_PASSWORD: birdlog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birdlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
    command: azurite-blob --blobHost 0.0.0.0 --loose
    volumes:
      - azuritedata:/data

volumes:
  pgdata:
  azuritedata:
