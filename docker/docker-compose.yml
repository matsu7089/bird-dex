services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: birdlog
      POSTGRES_USER: birdlog
      POSTGRES_PASSWORD: birdlog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birdlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    volumes:
      - rustfsdata:/data
      - rustfslogs:/logs
      - ./init-rustfs.sh:/init-rustfs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 3 http://localhost:9000/ 2>/dev/null; exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://rustfs:9000 rustfsadmin rustfsadmin
        mc mb --ignore-existing local/birdlog-photos
        mc anonymous set download local/birdlog-photos
        echo "RustFS bucket initialized."

volumes:
  pgdata:
  rustfsdata:
  rustfslogs:
